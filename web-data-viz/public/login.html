<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/login.css">

    <title>Login</title>
</head>

<body>
    <header>
     <img src="img/logo.png" alt="Logo Conexão Acadêmica">
    <h3>Conexão Acadêmica</h3>
    <nav>
      <button onclick="menu()">
        <img id="imagem-menu" src="img/menu.png" alt="Menu Hamburguer">
      </button>
      <ul id="menu">
        <li><img id="home-imagem" src="" alt="Imagem Home"><a href="index.html">Home</a></li>
        <li><img id="sobre-imagem" src="" alt="Imagem Sobre Nós"><a href="index.html#section-sobrenos">Sobre Nós</a></li>
        <li><img id="contato-imagem" src="" alt="Imagem Contate-nos"><a href="index.html#section-contactus">Contate-nos</a></li>
        <li><img id="login-imagem" src="" alt="Imagem Login"><a href="login.html">Login</a></li>
      </ul>
    </nav>
    </header>
    <main>
        <div class="caixa">
            <p class="titulo"> Faça login para acessar seus dados: </p>
            <p class="tex"> Email: </p>
            <input type="text" id="ipt_email" onkeyup="onkey_email()">
            <div id="div_msg_email" class="tex b"></div>
            <p class="tex"> Senha: </p>
            <div class="senha-box">
                <input type="password" id="ipt_senha"  onkeyup="onkey_senha()">

                <img src="./img/olho_fechado.png" alt="Mostrar senha" class="olho-senha"
                    onclick="mostrarSenha('ipt_senha', this)">
            </div>
            <div id="div_msg_senha" class="tex b"></div>
            <button class="btn_entrar" onclick="entrar()"> Entrar</button>
            <div class="tex b s" id="div_msg_login"></div>
            <p class="sub">
                Ainda não é parceiro?
            </p>
            <a class="sub link" href="cadastro.html"> Faça seu cadastro</a>
        </div>
    </main>
</body>
<script src="./javascript/login.js"></script>

</html>
