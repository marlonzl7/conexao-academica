<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/login.css">

    <title>Login</title>
</head>

<body>
    <header>
        <div>
            <img class="logo" src="./img/logo_escuro.png" alt="logo">
        </div>
        <ul>
            <a href="">Sobre nós</a>
            <a href="">Contato</a>
            <a href="">Login</a>
        </ul>
    </header>
    <main>
        <div class="caixa">
            <p class="titulo"> Faça login para acessar seus dados: </p>
            <p class="tex"> Email: </p>
            <input type="text" id="ipt_email" onkeyup="onkey_email()">
            <div id="div_msg_email" class="tex b"></div>
            <p class="tex"> Senha: </p>
            <div class="senha-box">
                <input type="password" id="ipt_senha">

                <img src="./img/olho_fechado.png" alt="Mostrar senha" class="olho-senha"
                    onclick="mostrarSenha('ipt_senha', this)">
            </div>
            <button onclick="entrar()"> Entrar</button>
            <p class="sub">
                Ainda não é parceiro?
            </p>
            <a class="sub link" href="cadastro.html"> Faça seu cadastro</a>
        </div>
    </main>
</body>
<script src="./javascript/login.js"></script>

</html>
