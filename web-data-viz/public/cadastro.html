<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="./assets/icons/logo_escuro.svg" alt="Logo Conexão Acadêmica">
        </div>
        
        <nav class="menu">
            <ul class="links">
                <a href="">Sobre nós</a>
                <a href="">Contato</a>
                <a href="">Login</a>
            </ul>
        </nav>
    </header>
    <main class="principal-container">
        <header class="header-container">
            <h3 class="title">
                Insira suas informações para cadastrar sua conta
            </h3>
            <p class="sub">
                Já possuí uma conta? <span id="link-login">Entrar</span>
            </p>
        </header>

        <div class="input-group">
            <div class="input-box">
                <label for="nome">Instituição:</label>
                <input list="instituicoes" name="instituicao" id="instituicao">

                <datalist id="instituicoes">
                    <option value="São Paulo Tech School">
                    <option value="Universidade de São Paulo">
                    <option value="Universidade Virtual do Estado de São Paulo">
                </datalist>
            </div>

            <div class="input-box">
                <label for="nome">Nome completo:</label>
                <input type="text" name="nome" id="nome">
                <div class="erro"><span id="nomeInvalido"></span></div>
            </div>
            
            <div class="input-box">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email">
                <div class="erro"><span id="emailInvalido"></span></div>
            </div>

            <div class="input-box">
                <label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha">
                <div class="erro"><span id="senhaInvalida"></span></div>
            </div>

            <div class="input-box">
                <label for="confirmarSenha">Confirmar senha:</label>
                <input type="password" name="confirmarSenha" id="confirmarSenha">
                <div class="erro"><span id="confirmarSenhaInvalida"></span></div>
            </div>
        </div>

        <div class="footer">
            <button class="btn-cadastro">Cadastrar</button>
        </div>
    </main>

    <script src="./js/cadastro.js"></script>
    <script src="./js/validacoes.js"></script>
</body>
</html>
